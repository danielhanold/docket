name: spike-approve-0062
on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number
        required: true
permissions:
  pull-requests: write
jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - run: gh pr review --approve "$PR" --repo "$GITHUB_REPOSITORY" --body "spike-0062 Arm B"
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ inputs.pr }}
