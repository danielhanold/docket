# .docket.yml — committed on the repo's default branch; read by every docket skill at startup.
#
# This repo runs in DOCKET-MODE (migrated 2026-06-04 via migrate-to-docket.sh — the dogfood of
# change 0002). Planning metadata (changes, board, ADRs, specs) is the live surface on the
# `docket` branch; `main` keeps code, build artifacts, and published terminal records. To opt
# back out to single-branch mode, set `metadata_branch: main`.
metadata_branch: docket
integration_branch: main
changes_dir: docs/changes
adrs_dir: docs/adrs
results_dir: docs/results

# Finalize merge gate (change 0015): rebase the feature branch onto the integration
# branch and re-validate the merged result before docket merges, so a behind-base PR
# can't land a semantically-broken integration branch. gate: local (default, on) |
# ci | both | off. `off` restores pre-0015 behavior (merge trusting the PR's own CI).
# test_command is normally unset — finalize auto-detects the suite; set it only to
# override a wrong guess.
finalize:
  gate: local
  # test_command:
  # require_pr_approval: false  # default. true => the auto-detect (no-arg) path refuses to merge an
  #                             #   unapproved PR (reviewDecision != APPROVED), surfacing it instead.
  #                             #   An explicit `docket-finalize-change <id>` always overrides this.

# Which derived board view(s) to render. A list; [] disables the board entirely.
#   inline  → BOARD.md on the metadata branch (offline-safe, committed)
#   github  → one-way GitHub Issues + Projects v2 mirror (scripts/github-mirror.sh)
# Default [inline] (github is strictly opt-in). [inline, github] = both; [github] = GitHub-only.
board_surfaces: [inline]
# github_project: {owner: <owner>, number: <n>}  — auto-managed Projects v2 board; minted
# (private, under the repo owner) and written back here on first `github` sync when unset.

# Which harnesses the per-repo agent pass generates files for (change 0045; generation went
# all-local in change 0051 — see below). Default [claude] (byte-identical to before). A Cursor
# repo would set [claude, cursor] so the agents: model config also reaches <repo>/.cursor/agents/.
# Model IDs pass through verbatim (harness-neutral — a Cursor id like gpt-5.5-medium-fast is
# emitted as-is). Unknown tokens are warned + dropped. This key (like agents: below) can also be
# set in .docket.local.yml — see that file's note. sync-agents.sh --check validates every listed
# harness's files.
# agent_harnesses: [claude]

# Per-skill subagent model/effort (change 0016), harness-first (change 0046). Generated into agent
# wrappers by sync-agents.sh. Keys are skill SHORT names nested under a reserved `default:` (the
# harness-neutral fallback) and, optionally, per-harness override keys (e.g. `cursor:`) that only
# need to list the fields that differ; resolution is field-by-field: agents.<harness>.<agent> ->
# agents.default.<agent> -> shipped built-in (agents/docket-*.md). Precedence across layers, per
# field (change 0051): this repo's .docket.local.yml (machine-local, gitignored, highest) > this
# block (repo-committed) > global (the agents: block in ~/.config/docket/config.yml) > built-in.
# `effort: auto` explicitly drops the effort line (inherit the model default); omitting the
# `effort:` key instead keeps the built-in effort — auto and omitted are NOT equivalent. Only the
# 5 autonomous skills have wrappers; new-change/groom-next are advisory-only and ignore this block.
# Configuring a skill here overrides its model/effort in the generated, machine-local
# .<harness>/agents/docket-<skill>.md — which is regenerated for every built-in regardless (full
# set; this block is override-only), gitignored via a managed .gitignore block, and never
# committed. Run `sync-agents.sh` after editing, and `sync-agents.sh --check` in CI to catch a
# missing/stale .gitignore block or an accidentally-tracked generated file (content drift itself is
# advisory only — every clone regenerates its own copy).
#
# The per-repo pass writes the FULL built-in agent set for every harness in agent_harnesses; this
# block is OVERRIDE-ONLY (tunes model/effort, never decides which agents exist). Per-repo generation
# is OPT-IN: declare this agents: block OR an agent_harnesses: key, in EITHER this file or
# .docket.local.yml, to opt in; a .docket.yml present for change-tracking only, with neither key
# set anywhere (like this repo), generates no per-repo wrappers and its --check stays a no-op. A
# `cursor` harness additionally gets a generated .cursor/rules/docket-dispatch.mdc dispatch rule.
# sync-agents.sh prunes orphaned docket-* files; --check spans the agents and the rule.
#
# agents:                                # harness-first: reserved default: + harness-name keys (change 0046)
#   default:                             # neutral fallback (field-level: <harness> -> default -> built-in)
#     implement-next: { model: opus,   effort: xhigh }
#     status:         { model: sonnet, effort: medium }
#   cursor:                              # override only what differs for a non-Claude harness
#     status:         { model: gpt-5.5-medium-fast }

# Pluggable workflow skills (change 0049). Rebinds any of the five workflow invocation points —
# brainstorm / plan / build / review / finish — to a different skill (the name passes to the Skill
# tool verbatim, unvalidated) or to `auto` (no skill; the running agent performs the step inline at
# its own model). Unset keys default to the superpowers skills shown, so an absent block is
# byte-identical to superpowers-everywhere; a resolved-but-unavailable skill degrades to that
# role's `auto` fallback with a prominent warning. Unknown role keys are warned + ignored. Shape
# and per-role fallback artifacts: docket-convention "Skill layer". This repo uses the superpowers
# defaults, so the block stays commented out.
#
# skills:
#   brainstorm: superpowers:brainstorming
#   plan:       superpowers:writing-plans
#   build:      superpowers:subagent-driven-development   # e.g. `auto` to build inline without SDD
#   review:     superpowers:requesting-code-review
#   finish:     superpowers:finishing-a-development-branch
