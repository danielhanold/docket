# .docket.yml — committed on the repo's default branch; read by every docket skill at startup.
#
# This repo runs in DOCKET-MODE (migrated 2026-06-04 via migrate-to-docket.sh — the dogfood of
# change 0002). Planning metadata (changes, board, ADRs, specs) is the live surface on the
# `docket` branch; `main` keeps code, build artifacts, and published terminal records. To opt
# back out to single-branch mode, set `metadata_branch: main`.
metadata_branch: docket
integration_branch: main
changes_dir: docs/changes
adrs_dir: docs/adrs
results_dir: docs/results

# Finalize merge gate (change 0015): rebase the feature branch onto the integration
# branch and re-validate the merged result before docket merges, so a behind-base PR
# can't land a semantically-broken integration branch. gate: local (default, on) |
# ci | both | off. `off` restores pre-0015 behavior (merge trusting the PR's own CI).
# test_command is normally unset — finalize auto-detects the suite; set it only to
# override a wrong guess.
finalize:
  gate: local
  # test_command:
  # require_pr_approval: false  # default. true => the auto-detect (no-arg) path refuses to merge an
  #                             #   unapproved PR (reviewDecision != APPROVED), surfacing it instead.
  #                             #   An explicit `docket-finalize-change <id>` always overrides this.

# Which derived board view(s) to render. A list; [] disables the board entirely.
#   inline  → BOARD.md on the metadata branch (offline-safe, committed)
#   github  → one-way GitHub Issues + Projects v2 mirror (scripts/github-mirror.sh)
# Default [inline] (github is strictly opt-in). [inline, github] = both; [github] = GitHub-only.
board_surfaces: [inline]
# github_project: {owner: <owner>, number: <n>}  — auto-managed Projects v2 board; minted
# (private, under the repo owner) and written back here on first `github` sync when unset.

# Which harnesses the per-repo agent pass generates committed wrappers for (change 0045).
# Default [claude] (byte-identical to before). A Cursor repo would set [claude, cursor] so the
# committed agents: model config also reaches <repo>/.cursor/agents/. Model IDs pass through
# verbatim (harness-neutral — a Cursor id like gpt-5.5-medium-fast is emitted as-is). Unknown
# tokens are warned + dropped. sync-agents.sh --check validates every listed harness's files.
# agent_harnesses: [claude]

# Per-skill subagent model/effort (change 0016), harness-first (change 0046). Generated into agent
# wrappers by sync-agents.sh. Keys are skill SHORT names nested under a reserved `default:` (the
# harness-neutral fallback) and, optionally, per-harness override keys (e.g. `cursor:`) that only
# need to list the fields that differ; resolution is field-by-field: agents.<harness>.<agent> ->
# agents.default.<agent> -> shipped built-in (agents/docket-*.md). Precedence across layers is
# per-repo (this block) > global (~/.config/docket/agents.yaml, same harness-first shape but at the
# FILE's top level — no `agents:` wrapper) > built-in. An `effort: auto` (or omitted) means inherit
# the model default (the frontmatter effort line is dropped). Only the 5 autonomous skills have
# wrappers; new-change/groom-next are advisory-only and ignore this block. Listing a skill here
# generates a COMMITTED project-level .<harness>/agents/docket-<skill>.md for each harness in
# agent_harnesses — run `sync-agents.sh` after editing, and `sync-agents.sh --check` in CI to catch
# drift.
#
# agents:                                # harness-first: reserved default: + harness-name keys (change 0046)
#   default:                             # neutral fallback (field-level: <harness> -> default -> built-in)
#     implement-next: { model: opus,   effort: xhigh }
#     status:         { model: sonnet, effort: medium }
#   cursor:                              # override only what differs for a non-Claude harness
#     status:         { model: gpt-5.5-medium-fast }
